<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 18th Birthday, Natasha 💕</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@500;700&family=Sriracha&family=Titan+One&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        @media (max-width: 768px) {
            .t-happy, .t-birthday { font-size: clamp(2.5rem, 12vw, 4rem) !important; }
            .css-badge { width: 150px; height: 150px; border-width: 5px; }
            .badge-text { font-size: 4rem; }
            .dob-pill { font-size: 1.2rem !important; padding: 10px 25px !important; }
            .portrait-section div:first-child { width: 200px !important; height: 200px !important; }
            .paper-note { font-size: 1.5rem !important; padding: 8px 20px !important; }
            .btn-main { font-size: 1.5rem !important; padding: 15px 40px !important; width: 100%; max-width: 300px; }
        }
    </style>
</head>

<body class="grid-bg">
    <!-- Shared Decor Manager handles floating elements -->
    <script src="decor.js"></script>

    <!-- Background Bubbles -->
    <div id="bubble-container"></div>

    <!-- Header Stickers with Parallax -->
    <div class="sticker parallax-decor" style="top: 20px; left: 10%; transform: rotate(-10deg); font-size: 3.5rem;" data-speed="0.05">✨</div>
    <div class="sticker parallax-decor" style="top: 150px; left: 5%; transform: rotate(20deg); font-size: 3rem;" data-speed="0.03">🌸</div>
    <div class="sticker parallax-decor" style="top: 40px; right: 10%; transform: rotate(15deg); font-size: 4rem;" data-speed="0.06">🎈</div>
    <div class="sticker parallax-decor" style="bottom: 100px; left: 8%; transform: rotate(-15deg); font-size: 3.2rem;" data-speed="0.04">💖</div>
    <div class="sticker parallax-decor" style="bottom: 150px; right: 12%; transform: rotate(10deg); font-size: 3.8rem;" data-speed="0.05">🎂</div>
    <div class="sticker parallax-decor" style="top: 40%; right: 5%; transform: rotate(-10deg); font-size: 2.8rem;" data-speed="0.02">🍭</div>
    <div class="sticker parallax-decor" style="top: 60%; left: 3%; transform: rotate(25deg); font-size: 3rem;" data-speed="0.04">🎀</div>
    <div class="sticker parallax-decor" style="bottom: 50px; right: 20%; transform: rotate(-5deg); font-size: 3.2rem;" data-speed="0.03">✨</div>

    <div class="page-container page-flip-in" id="landingPage">
        <div class="p1-content"
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; position: relative; z-index: 2;">

            <div class="glass-panel floating-hero">
                <div class="title-wrap" style="margin-bottom: 2.5rem;">
                    <h1 class="t-happy poppy-text"
                        style="font-family: 'Titan One'; font-size: clamp(3.5rem, 10vw, 7rem); color: var(--white); text-shadow: 6px 6px 0 var(--black); margin-bottom: -1rem;">
                        <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
                    </h1>
                    <h1 class="t-birthday poppy-text"
                        style="font-family: 'Titan One'; font-size: clamp(3.5rem, 10vw, 7rem); color: var(--pink); text-shadow: 6px 6px 0 var(--black);">
                        <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>
                    </h1>
                    <div style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--text-dark); margin-top: -0.5rem; transform: rotate(-2deg); font-weight: 700;">Natasha ✨</div>
                </div>

                <div class="hat-wrap" style="display: flex; justify-content: center; margin-bottom: 3rem;">
                    <div class="css-badge">
                        <div class="badge-text">18</div>
                    </div>
                </div>

                <div class="dob-pill glow-pulse"
                    style="background: linear-gradient(135deg, var(--pink), var(--pink-dark)); border: 4px solid var(--black); border-radius: 50px; padding: 12px 40px; font-size: 1.8rem; color: var(--white); box-shadow: 6px 6px 0 var(--black); margin-bottom: 3.5rem; display: inline-flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-crown" style="color: gold;"></i> <span id="dobTxt"></span> <i class="fa-solid fa-cake-candles"></i>
                </div>

                <div class="portrait-section" style="position: relative; margin-bottom: 4rem; display: flex; justify-content: center;">
                    <div class="glow-pulse"
                        style="width: 280px; height: 280px; border: 8px solid var(--black); border-radius: 50%; overflow: hidden; background: var(--pink-mid); position: relative;">
                        <img src="assets/Natasha Anime .jpeg" alt="Natasha"
                            style="width: 100%; height: 100%; object-fit: cover;"
                            onerror="this.src='https://api.placeholder.com/280/280/FF7882/FFFFFF?text=Natasha'">
                    </div>
                    <div class="paper-note"
                        style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%) rotate(2deg); background: var(--white); border: 3px solid var(--black); padding: 10px 35px; border-radius: 5px; color: var(--text-dark); font-family: 'Dancing Script'; font-size: 2.2rem; white-space: nowrap; box-shadow: 5px 5px 0 var(--black);">
                        Dear Natasha 💕
                        <div class="tape" style="top: -15px; left: 50%; transform: translateX(-50%) rotate(-5deg); width: 80px;"></div>
                    </div>
                </div>

                <button class="btn-main glow-pulse" id="btnEnter" onclick="handleEnter()" style="font-size: 2rem; padding: 25px 60px;">
                    Open Your Gift <i class="fa-solid fa-gift" style="animation: bounce 1s infinite;"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="music.js"></script>
    <script>
        // Background Bubbles
        const bubbleContainer = document.getElementById('bubble-container');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'floating-bubble';
            const size = Math.random() * 60 + 20;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.setProperty('--d', (Math.random() * 10 + 10) + 's');
            bubble.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
            bubble.style.animationDelay = (Math.random() * 10) + 's';
            bubbleContainer.appendChild(bubble);
        }

        // Parallax & Sparkle Effect
        document.addEventListener('mousemove', (e) => {
            // Parallax
            document.querySelectorAll('.parallax-decor').forEach(decor => {
                const speed = decor.getAttribute('data-speed');
                const x = (window.innerWidth - e.pageX * speed) / 25;
                const y = (window.innerHeight - e.pageY * speed) / 25;
                decor.style.transform = `translate(${x}px, ${y}px) rotate(${decor.style.transform.match(/rotate\((.*?)\)/)?.[1] || '0deg'})`;
            });

            // Sparkles
            if (Math.random() > 0.1) return;
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-trail';
            sparkle.style.left = e.pageX + 'px';
            sparkle.style.top = e.pageY + 'px';
            sparkle.style.backgroundColor = ['#FF7882', '#FFD6D9', '#D4A96A', '#FFFFFF'][Math.floor(Math.random() * 4)];
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        });

        // Date Typewriter
        const dob = "24 April";
        let di = 0;
        const dobEl = document.getElementById('dobTxt');

        setTimeout(() => {
            const iv = setInterval(() => {
                if (di < dob.length) {
                    dobEl.textContent += dob[di++];
                } else {
                    clearInterval(iv);
                }
            }, 150);
        }, 1000);

        function handleEnter() {
            createConfetti();
            setTimeout(() => {
                startMusic();
                navigateTo('menu.html');
            }, 800);
        }

        function createConfetti() {
            const colors = ['#FF7882', '#FFFFFF', '#D4A96A', '#ffd6d9'];
            for (let i = 0; i < 100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = '50vw';
                c.style.top = '70vh';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = Math.random() * 10 + 5 + 'px';
                c.style.height = c.style.width;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 5;
                c.style.setProperty('--vx', Math.cos(angle) * velocity + 'px');
                c.style.setProperty('--vy', Math.sin(angle) * velocity - 10 + 'px');
                c.style.animation = `confetti-pop 1.5s ease-out forwards`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 1500);
            }
        }

        // Staggered Poppy Text Init
        document.querySelectorAll('.poppy-text span').forEach((span, i) => {
            span.style.animationDelay = (i * 0.1) + 's';
        });
    </script>


</body>

</html>
